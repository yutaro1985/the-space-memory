name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_name: darwin-arm64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_name: linux-arm64
            use_cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        if: ${{ !matrix.use_cross }}
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@d858f8113943481093e02986a7586a4819a3bfd6  # v2.71.2
        with:
          tool: cross

      - name: Build release binaries
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }}

      - name: Package archive
        env:
          TAG: ${{ github.ref_name }}
          ARCHIVE_NAME: ${{ matrix.archive_name }}
          TARGET: ${{ matrix.target }}
        run: |
          DIR="tsm-${TAG}-${ARCHIVE_NAME}"
          mkdir -p "${DIR}/data" "${DIR}/docs"
          cp "target/${TARGET}/release/tsm" "${DIR}/"
          cp "target/${TARGET}/release/tsmd" "${DIR}/"
          cp README.md LICENSE tsm.toml.sample "${DIR}/"
          cp data/stopwords.txt "${DIR}/data/"
          cp docs/user-dictionary.md "${DIR}/docs/"
          cp -r hooks "${DIR}/"
          tar czf "${DIR}.tar.gz" "${DIR}"

      - name: Upload archive
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: tsm-${{ matrix.archive_name }}
          path: tsm-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          generate_release_notes: true
          files: tsm-*.tar.gz
