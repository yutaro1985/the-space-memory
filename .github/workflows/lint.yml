name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
      - run: rumdl check .

  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
      - run: yamllint .

  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
      - run: shellcheck .devcontainer/*.sh

  toml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
      - run: taplo check

  mise-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
        id: mise
      - name: Check for mise warnings
        run: |
          output=$(mise install 2>&1 || true)
          if echo "$output" | grep -qi "WARN"; then
            echo "::error::mise produced warnings:"
            echo "$output" | grep -i "WARN"
            exit 1
          fi
